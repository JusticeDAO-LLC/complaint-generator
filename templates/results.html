<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile Data</title>
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <!-- jQuery library -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <style>
        body {
            background: #f8fafc;
            color: #0f172a;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 32px 20px;
        }

        .results-shell {
            max-width: 960px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12);
            padding: 28px;
        }

        .surface-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .surface-link {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 999px;
            background: #e2e8f0;
            color: #0f172a;
            font-weight: 600;
            text-decoration: none;
        }

        #Err {
            display: none;
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 12px;
            background: #fee2e2;
            color: #991b1b;
        }

        #profile_data {
            white-space: pre-wrap;
            word-break: break-word;
            font-family: "Courier New", monospace;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            padding: 18px;
            min-height: 240px;
        }
    </style>
    <script>
        hostname = "localhost:19000";

        function load_profile(username, password, email) {

            $.ajaxSetup({
                async: false
            }); //execute synchronously
            var returnData = null; //define returnData outside the scope of the callback function
            $.ajax({
                type: "POST",
                contentType: 'application/json',
                url: "/load_profile",
                data: '{"request": {"hashed_username" : "' + username + '", "hashed_password": "' + password + '"}}',
                dataType: 'json',
                async: false,
                success: function(data) {
                    returnData = data;
                }
            });

            // alert(JSON.stringify(returnData));
            $.ajaxSetup({
                async: true
            }); //return to default setting
            //alert(JSON.stringify(returnData));
            //alert(returnData[0]["body"]);
            //data = returnData[0]["data"];
            // alert(JSON.stringify(returnData));
            if ("Err" in returnData) {
                // alert("This Login Err: " + JSON.stringify(returnData));
                show_error(returnData["Err"]);
                return returnData;
            } else {
                // window.location();
                return returnData;
            }
            return returnData;
        }

        function show_error(message) {
            form_field = $("#Err").html();
            form_field = "<span>" + message + "</span>";
            $("#Err").html(form_field);
            $("#Err").show();
            // alert(message)
        }

        $(document).ready(function() {
            cookies = "";
            $("body").css("background-color", "transparent");
            $.ajax({
                url: "/cookies",
                type: "get",
                async: false,
                data: {},
                success: function(data) {
                    // alert(data);
                    cookies = data;
                }
            });
            // alert(JSON.parse(cookies));
            hashed_username = JSON.parse(cookies)["hashed_username"];
            hashed_password = JSON.parse(cookies)["hashed_password"];
            // alert(hashed_username);
            profile = load_profile(hashed_username, hashed_password);
            testdata = profile["data"];
            testdata = JSON.parse(testdata);
            $("#profile_data").html(JSON.stringify(testdata));

        });
    </script>
</head>

<body>
    <div class="results-shell">
        <h1>Profile Data</h1>
        <div class="surface-links" data-surface-nav="primary" aria-label="Complaint Generator Navigation">
            <a class="surface-link" href="/">Landing</a>
            <a class="surface-link" href="/home">Account</a>
            <a class="surface-link" href="/chat">Chat</a>
            <a class="surface-link" href="/profile">Profile</a>
            <a class="surface-link" href="/results">Results</a>
            <a class="surface-link" href="/claim-support-review">Review</a>
            <a class="surface-link" href="/document">Builder</a>
            <a class="surface-link" href="/document/optimization-trace">Trace</a>
            <a class="surface-link" href="/mlwysiwyg">Editor</a>
            <a class="surface-link" href="/ipfs-datasets/sdk-playground">SDK</a>
            <a class="surface-link" href="/dashboards">Dashboards</a>
        </div>
        <div class="Err">
            <div id="Err">
                <br/>
            </div>
        </div>
        <div id="profile_data">

        </div>
    </div>



</body>


</html>
