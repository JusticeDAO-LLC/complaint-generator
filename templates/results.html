<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile Data</title>
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <!-- jQuery library -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <style>
        body {
            padding: 1rem;
        }

        #profile_data {
            white-space: pre-wrap;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 0.25rem;
            padding: 1rem;
            margin-top: 1rem;
        }

        #chat_history {
            margin-top: 1rem;
        }

        .chat-history-entry {
            border-bottom: 1px solid #e9ecef;
            padding: 0.5rem 0;
        }

        .chat-history-explanation {
            color: #6c757d;
            margin-left: 1rem;
            font-size: 0.9rem;
        }
    </style>
    <script src="/static/chat_entry_utils.js"></script>
    <script src="/static/profile_data.js"></script>
    <script>
        $(document).ready(function() {
            window.ProfileDataPage.initialize({
                jsonSelector: '#profile_data',
                historySelector: '#chat_history',
            });
        });
    </script>
</head>

<body>
    <div class="Err">
        <div id="Err">
            <br/>
        </div>
        <h4>Results Data</h4>
        <pre id="profile_data"></pre>
        <h4>Recent Chat History</h4>
        <div id="chat_history"></div>



</body>


</html>
