<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile Data</title>
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/complaint_app_shell.css">
    <!-- jQuery library -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script defer src="/static/complaint_mcp_sdk.js"></script>
    <script defer src="/static/complaint_app_shell.js"></script>
    <style>
        body {
            padding: 1rem;
        }

        #profile_data {
            white-space: pre-wrap;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 0.25rem;
            padding: 1rem;
            margin-top: 1rem;
        }

        #chat_history {
            margin-top: 1rem;
        }

        .chat-history-entry {
            border-bottom: 1px solid #e9ecef;
            padding: 0.5rem 0;
        }

        .chat-history-explanation {
            color: #6c757d;
            margin-left: 1rem;
            font-size: 0.9rem;
        }

        .surface-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .surface-link {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 999px;
            background: #e2e8f0;
            color: #0f172a;
            font-weight: 600;
            text-decoration: none;
        }

        .profile-shell {
            max-width: 960px;
            margin: 0 auto;
        }
    </style>
    <script src="/static/chat_entry_utils.js"></script>
    <script src="/static/profile_data.js"></script>
    <script>
        $(document).ready(function() {
            window.ProfileDataPage.initialize({
                jsonSelector: '#profile_data',
                historySelector: '#chat_history',
                refreshMs: 5000,
            });
        });
    </script>
</head>

<body>
    <div class="profile-shell">
        <div class="surface-links" data-surface-nav="primary" aria-label="Complaint Generator Navigation">
            <a class="surface-link" href="/">Landing</a>
            <a class="surface-link" href="/home">Account</a>
            <a class="surface-link" href="/chat">Chat</a>
            <a class="surface-link" href="/profile">Profile</a>
            <a class="surface-link" href="/results">Results</a>
            <a class="surface-link" href="/claim-support-review">Review</a>
            <a class="surface-link" href="/document">Builder</a>
            <a class="surface-link" href="/document/optimization-trace">Trace</a>
            <a class="surface-link" href="/mlwysiwyg">Editor</a>
            <a class="surface-link" href="/ipfs-datasets/sdk-playground">SDK</a>
            <a class="surface-link" href="/dashboards">Dashboards</a>
        </div>
        <div class="Err">
            <div id="Err">
                <br/>
            </div>
        </div>
        <h4>Profile Data</h4>
        <pre id="profile_data"></pre>
        <h4>Recent Chat History</h4>
        <div id="chat_history"></div>
    </div>
</body>


</html>
