name: HACC Grounding Regression

on:
  workflow_dispatch:
    inputs:
      skip_smoke:
        description: "Skip the live smoke run and execute only the pytest validations"
        required: false
        default: true
        type: boolean

jobs:
  hacc-grounding:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run HACC grounding regression without live smoke
        if: ${{ inputs.skip_smoke }}
        run: python scripts/run_hacc_grounding_regression.py --skip-smoke

      - name: Run full HACC grounding regression
        if: ${{ !inputs.skip_smoke }}
        run: python scripts/run_hacc_grounding_regression.py
