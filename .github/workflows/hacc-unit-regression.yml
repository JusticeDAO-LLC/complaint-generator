name: HACC Unit Regression

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/hacc-unit-regression.yml
      - adversarial_harness/hacc_evidence.py
      - scripts/run_hacc_unit_regression.py
      - scripts/run_hacc_grounding_regression.py
      - scripts/run_hacc_adversarial_report.py
      - scripts/synthesize_hacc_complaint.py
      - tests/test_hacc_evidence_loader.py
      - tests/test_synthesize_hacc_complaint.py
      - tests/test_run_hacc_adversarial_report.py
      - tests/test_run_hacc_unit_regression_cli.py
      - tests/test_run_hacc_grounding_regression_cli.py
      - pytest.ini
      - requirements.txt
  push:
    branches:
      - master
    paths:
      - .github/workflows/hacc-unit-regression.yml
      - adversarial_harness/hacc_evidence.py
      - scripts/run_hacc_unit_regression.py
      - scripts/run_hacc_grounding_regression.py
      - scripts/run_hacc_adversarial_report.py
      - scripts/synthesize_hacc_complaint.py
      - tests/test_hacc_evidence_loader.py
      - tests/test_synthesize_hacc_complaint.py
      - tests/test_run_hacc_adversarial_report.py
      - tests/test_run_hacc_unit_regression_cli.py
      - tests/test_run_hacc_grounding_regression_cli.py
      - pytest.ini
      - requirements.txt

jobs:
  hacc-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run HACC unit regression
        run: python scripts/run_hacc_unit_regression.py
