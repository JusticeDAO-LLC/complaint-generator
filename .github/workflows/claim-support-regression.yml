name: Claim Support Regression

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/claim-support-regression.yml
      - applications/document_ui.py
      - complaint_phases/**
      - mediator/claim_support_hooks.py
      - mediator/mediator.py
      - applications/review_api.py
      - applications/review_ui.py
      - claim_support_review.py
      - templates/claim_support_review.html
      - scripts/run_claim_support_review_regression.py
      - scripts/backfill_claim_testimony_links.py
      - tests/test_claim_support_hooks.py
      - tests/test_review_api.py
      - tests/test_claim_support_review_dashboard_flow.py
      - tests/test_claim_support_review_playwright_smoke.py
      - tests/test_backfill_claim_testimony_links_cli.py
      - tests/test_run_claim_support_review_regression_cli.py
      - pytest.ini
      - requirements.txt
  push:
    branches:
      - master
    paths:
      - .github/workflows/claim-support-regression.yml
      - applications/document_ui.py
      - complaint_phases/**
      - mediator/claim_support_hooks.py
      - mediator/mediator.py
      - applications/review_api.py
      - applications/review_ui.py
      - claim_support_review.py
      - templates/claim_support_review.html
      - scripts/run_claim_support_review_regression.py
      - scripts/backfill_claim_testimony_links.py
      - tests/test_claim_support_hooks.py
      - tests/test_review_api.py
      - tests/test_claim_support_review_dashboard_flow.py
      - tests/test_claim_support_review_playwright_smoke.py
      - tests/test_backfill_claim_testimony_links_cli.py
      - tests/test_run_claim_support_review_regression_cli.py
      - pytest.ini
      - requirements.txt

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: no-browser
            browser_mode: off
            install_browser: false
          - label: browser
            browser_mode: on
            install_browser: true

    name: claim-support-${{ matrix.label }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright package
        if: matrix.install_browser
        run: python -m pip install playwright

      - name: Install Chromium runtime
        if: matrix.install_browser
        run: python -m playwright install --with-deps chromium

      - name: Run claim-support regression
        run: python scripts/run_claim_support_review_regression.py --browser ${{ matrix.browser_mode }}