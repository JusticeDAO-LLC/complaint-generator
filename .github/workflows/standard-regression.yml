name: Standard Regression

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/standard-regression.yml
      - Makefile
      - README.md
      - tests/README.md
      - applications/document_api.py
      - applications/review_api.py
      - applications/review_ui.py
      - claim_support_review.py
      - document_optimization.py
      - document_pipeline.py
      - mediator/claim_support_hooks.py
      - mediator/formal_document.py
      - mediator/mediator.py
      - scripts/backfill_claim_testimony_links.py
      - templates/claim_support_review.html
      - templates/document.html
      - workflow_phase_guidance.py
      - scripts/run_standard_regression.py
      - tests/test_run_standard_regression_cli.py
      - tests/test_review_api.py
      - tests/test_claim_support_review_dashboard_flow.py
      - tests/test_claim_support_hooks.py
      - tests/test_backfill_claim_testimony_links_cli.py
      - tests/test_claim_support_review_template.py
      - tests/test_document_pipeline.py
      - tests/test_formal_document_pipeline.py
      - tests/test_claim_support_review_playwright_smoke.py
      - pytest.ini
      - requirements.txt
  push:
    branches:
      - master
    paths:
      - .github/workflows/standard-regression.yml
      - Makefile
      - README.md
      - tests/README.md
      - applications/document_api.py
      - applications/review_api.py
      - applications/review_ui.py
      - claim_support_review.py
      - document_optimization.py
      - document_pipeline.py
      - mediator/claim_support_hooks.py
      - mediator/formal_document.py
      - mediator/mediator.py
      - scripts/backfill_claim_testimony_links.py
      - templates/claim_support_review.html
      - templates/document.html
      - workflow_phase_guidance.py
      - scripts/run_standard_regression.py
      - tests/test_run_standard_regression_cli.py
      - tests/test_review_api.py
      - tests/test_claim_support_review_dashboard_flow.py
      - tests/test_claim_support_hooks.py
      - tests/test_backfill_claim_testimony_links_cli.py
      - tests/test_claim_support_review_template.py
      - tests/test_document_pipeline.py
      - tests/test_formal_document_pipeline.py
      - tests/test_claim_support_review_playwright_smoke.py
      - pytest.ini
      - requirements.txt

jobs:
  standard-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright package
        run: python -m pip install playwright

      - name: Install Chromium runtime
        run: python -m playwright install --with-deps chromium

      - name: Run standard regression
        run: python scripts/run_standard_regression.py