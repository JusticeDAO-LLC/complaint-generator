[pytest]
# Pytest configuration for complaint-generator

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths =
    tests
    ipfs_datasets_py/ipfs_accelerate_py/test/api

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --import-mode=importlib

# Markers for organizing tests
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    browser: Browser-backed tests that require Playwright and a browser runtime
    flaky: Tests that are known to be flaky / timing-sensitive
    llm: Requires an LLM or LLM-weighted dependencies; skipped unless enabled
    network: Requires network access; skipped unless enabled
    no_auto_network: Opt out of content-based auto-network classification for mock-only tests
    heavy: Resource-heavy (GPU/large models/large datasets); skipped unless enabled
    benchmark: Benchmark performance tests
    performance: Performance and optimization tests
    
# Asyncio mode
asyncio_mode = auto

# Vendored upstream warning filters
filterwarnings =
    ignore:processors\.registry is deprecated\..*:DeprecationWarning
    ignore:processors\.caching is deprecated\..*:DeprecationWarning
    ignore:processors\.error_handling is deprecated\..*:DeprecationWarning
    ignore:processors\.monitoring is deprecated\..*:DeprecationWarning
    ignore:processors\.pdf_processing is deprecated\..*:DeprecationWarning
    ignore:processors\.graphrag_integrator is deprecated\..*:DeprecationWarning
    ignore:processors\.ocr_engine is deprecated\..*:DeprecationWarning
    ignore:processors\.classify_with_llm is deprecated.*:DeprecationWarning
    ignore:search_embeddings using mock implementation due to missing dependencies.*:UserWarning

